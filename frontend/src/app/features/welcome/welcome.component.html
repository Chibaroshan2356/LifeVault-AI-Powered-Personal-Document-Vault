<!-- ============================================================
     LifeVault AI — Premium Apple-Style Welcome Page
     ============================================================ -->

<section class="welcome-page"
  [class.is-loaded]="isLoaded"
  [class.is-leaving]="isLeaving"
  (mousemove)="onMouseMove($event)">

  <!-- ══════════════ ATMOSPHERIC BACKGROUND ══════════════ -->
  <div class="bg-canvas">
    <!-- Smooth radial light shafts / volumetric backlights -->
    <div class="glow-light gl-royal"></div>
    <div class="glow-light gl-cyan"></div>
    <div class="glow-light gl-indigo"></div>
    <div class="glow-light gl-center"></div>
    <!-- Clean star field -->
    <div class="starfield"></div>
  </div>

  <!-- ══════════════ MINIMAL TWO-COLUMN CONTAINER ══════════════ -->
  <div class="welcome-container">

    <!-- ════ LEFT COLUMN: BRAND & ENTER ACTION ════ -->
    <div class="content-column">
      
      <!-- Brand Logo -->
      <div class="brand-header" [class.visible]="showBrand">
        <div class="brand-logo">
          <svg width="24" height="24" viewBox="0 0 26 26" fill="none">
            <circle cx="13" cy="13" r="12" stroke="#3b82f6" stroke-width="1.2" opacity="0.8"/>
            <circle cx="13" cy="13" r="6"  fill="#3b82f6" opacity="0.18"/>
            <circle cx="13" cy="13" r="2.5" fill="#60a5fa"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">LifeVault</span>
          <span class="brand-ai">AI</span>
        </div>
      </div>

      <!-- Taglines (Large Keynote Typography) -->
      <div class="headline-stack" [class.visible]="showTagline">
        <h1 class="headline h1">Protect.</h1>
        <h1 class="headline h2">Understand.</h1>
        <h1 class="headline h3">Organize.</h1>
      </div>

      <!-- Caption -->
      <p class="subtitle" [class.visible]="showSub">
        Your personal AI document intelligence platform.
      </p>

      <!-- Technology Pills -->
      <div class="tech-pills" [class.visible]="showBadges">
        <span class="pill">EasyOCR</span>
        <span class="pill">LayoutLMv3</span>
        <span class="pill primary">Secure Vault</span>
      </div>

      <!-- CTA Enter Vault Button -->
      <div class="cta-wrap" [class.visible]="showBtn">
        <button id="enter-vault-btn" class="enter-btn" (click)="enterVault()">
          <span class="btn-bloom"></span>
          <span class="btn-shine"></span>
          <span class="btn-content">Enter Vault</span>
        </button>
      </div>

    </div>

    <!-- ════ RIGHT COLUMN: 3D HERO CANVAS ════ -->
    <div class="hero-column">
      <div class="canvas-container">
        <canvas #welcomeCanvas class="three-canvas"></canvas>
      </div>
    </div>

  </div>

  <!-- Smooth White Out Transition -->
  <div class="entry-flash" [class.active]="isLeaving"></div>

</section>
