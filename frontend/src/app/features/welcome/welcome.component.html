<!-- ============================================================
     LifeVault AI — Cinematic Welcome Page v3
     /welcome — appears after login, before dashboard
     ============================================================ -->

<section class="welcome-page"
  [class.is-loaded]="isLoaded"
  [class.is-leaving]="isLeaving"
  (mousemove)="onMouseMove($event)">

  <!-- ══════════════ CINEMATIC BACKGROUND ══════════════ -->
  <div class="bg-canvas">
    <!-- Aurora layers -->
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <!-- Star field -->
    <div class="star-field"></div>
    <!-- Fog layer -->
    <div class="fog-layer"></div>
    <!-- Light beams -->
    <div class="light-beam lb-1"></div>
    <div class="light-beam lb-2"></div>
    <!-- Volumetric center glow -->
    <div class="vol-light"></div>
  </div>

  <!-- ══════════════ GLASS PANEL ══════════════ -->
  <div class="glass-panel">

    <!-- ════ LEFT PANEL (Minimalist AI Portal) ════ -->
    <div class="left-panel">

      <!-- Brand -->
      <div class="brand" [class.visible]="showBrand">
        <div class="brand-orb">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <circle cx="13" cy="13" r="12" stroke="#3b82f6" stroke-width="1.2" opacity="0.8"/>
            <circle cx="13" cy="13" r="6"  fill="#3b82f6" opacity="0.18"/>
            <circle cx="13" cy="13" r="2.5" fill="#60a5fa"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">LifeVault</span>
          <span class="brand-ai">AI</span>
        </div>
        <div class="brand-version">v3.0.0</div>
      </div>

      <!-- Tagline stack -->
      <div class="tagline-stack" [class.visible]="showTagline">
        <h1 class="tagline t1">Protect.</h1>
        <h1 class="tagline t2">Understand.</h1>
        <h1 class="tagline t3">Organize.</h1>
      </div>

      <!-- Subtitle -->
      <p class="sub-caption" [class.visible]="showSub">
        LifeVault AI secures every important document using multimodal AI.
      </p>

      <!-- Tech badges -->
      <div class="badges" [class.visible]="showBadges">
        <span class="badge">EasyOCR</span>
        <span class="badge">LayoutLMv3</span>
        <span class="badge primary">Secure Vault</span>
      </div>

      <!-- ════ ENTER VAULT BUTTON ════ -->
      <div class="cta-wrap" [class.visible]="showBtn">
        <button
          id="enter-vault-btn"
          class="vault-btn stage-ready"
          (click)="enterVault()">

          <!-- Corner lines (animated border) -->
          <span class="corner-line tl-h"></span>
          <span class="corner-line tl-v"></span>
          <span class="corner-line tr-h"></span>
          <span class="corner-line tr-v"></span>
          <span class="corner-line bl-h"></span>
          <span class="corner-line bl-v"></span>
          <span class="corner-line br-h"></span>
          <span class="corner-line br-v"></span>

          <!-- Shine sweep -->
          <span class="btn-shine"></span>

          <!-- Glow ring behind button -->
          <span class="btn-bloom"></span>

          <!-- Content -->
          <span class="btn-inner">
            <span class="btn-top">ENTER VAULT</span>
            <span class="btn-sub">Ready →</span>
          </span>
        </button>

        <a class="secondary-link" href="https://github.com/Chibaroshan2356" target="_blank" rel="noopener">
          View on GitHub ↗
        </a>
      </div>

    </div>
    <!-- end .left-panel -->

    <!-- ════ RIGHT PANEL (Organic Liquid Crystal Nucleus) ════ -->
    <div class="right-panel">
      <canvas #welcomeCanvas class="scene-canvas"></canvas>

      <!-- Lens flares -->
      <div class="lens-flare lf-1"></div>
      <div class="lens-flare lf-2"></div>
      <div class="lens-flare lf-3"></div>
    </div>

  </div>
  <!-- end .glass-panel -->

  <!-- White flash overlay for vault entry -->
  <div class="entry-flash" [class.active]="isLeaving"></div>

</section>
