<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LifeVault - AI Document Vault</title>
    <!--
      Viewport meta tag: Ensures proper rendering on mobile devices.
      initial-scale=1 prevents automatic zooming on mobile browsers.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Meta description: Used by search engines and social media previews.
    -->
    <meta
      name="description"
      content="LifeVault - Securely store, organize and manage your important documents with AI-powered features"
    />
    <!--
      Theme color: Matches our Angular Material primary color for browser chrome.
    -->
    <meta name="theme-color" content="#3f51b5" />
    <!--
      Favicon: Shown in browser tabs and bookmarks.
    -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!--
      Google Fonts - Roboto: Required by Angular Material.
      Loaded as stylesheet for proper text rendering.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!--
      Material Icons: Required for Angular Material icon components.
    -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body class="mat-typography">
    <!--
      Root component: Angular replaces this with the actual app component.
      The app-root selector matches the AppComponent selector.
    -->
    <app-root></app-root>
  </body>
</html>
