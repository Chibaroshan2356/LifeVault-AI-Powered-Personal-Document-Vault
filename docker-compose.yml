##############################################################
# docker-compose.yml - LifeVault Development Stack
#
# Services:
#   mongodb    — MongoDB 7 database
#   backend    — Node.js Express API  (port 3000)
#   ai-service — Python FastAPI       (port 8000)
#   frontend   — Angular dev server   (port 4200)
#
# Usage:
#   Start all:   docker compose up -d
#   Stop all:    docker compose down
#   With build:  docker compose up -d --build
#   Logs:        docker compose logs -f backend
##############################################################

version: '3.9'

services:

  # ----------------------------------------------------------
  # MongoDB
  # ----------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: lifevault-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lifevault
    networks:
      - lifevault-network

  # ----------------------------------------------------------
  # Express.js Backend
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: lifevault-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV:       development
      PORT:           3000
      MONGODB_URI:    mongodb://mongodb:27017/lifevault
      CORS_ORIGIN:    http://localhost:4200
      AI_SERVICE_URL: http://ai-service:8000
      # Secrets are loaded from backend/.env via env_file above.
      # Generate strong secrets:
      #   node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
    volumes:
      - ./uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      - mongodb
    networks:
      - lifevault-network

  # ----------------------------------------------------------
  # Python FastAPI AI Service
  # ----------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.ai
    container_name: lifevault-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      USE_GPU:     "false"
      LOG_LEVEL:   INFO
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:4200"]'
    volumes:
      - ./uploads:/app/temp_uploads
      - ./ai-service/logs:/app/logs
      - ./models:/app/models
    networks:
      - lifevault-network

  # ----------------------------------------------------------
  # Angular Frontend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: lifevault-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - lifevault-network

volumes:
  mongo-data:

networks:
  lifevault-network:
    driver: bridge
